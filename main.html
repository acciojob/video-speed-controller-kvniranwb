<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Speed Scrubber</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="player">

  <video class="viewer"
    src="https://www.w3schools.com/html/mov_bbb.mp4">
  </video>

  <!-- Progress Bar -->
  <div class="progress">
    <div class="progress__filled"></div>
  </div>

  <!-- Controls -->
  <div class="player__controls">

    <!-- Play Pause -->
    <button class="player__button toggle">►</button>

    <!-- Rewind -->
    <button data-skip="-10" class="player__button">
      « 10s
    </button>

    <!-- Forward -->
    <button data-skip="25" class="player__button">
      25s »
    </button>

    <!-- Volume -->
    <input type="range"
      name="volume"
      class="player__slider"
      min="0"
      max="1"
      step="0.05"
      value="1">

    <!-- Playback Speed -->
    <input type="range"
      name="playbackRate"
      class="player__slider"
      min="0.5"
      max="2"
      step="0.1"
      value="1">

  </div>
</div>

<script src="./script.js"></script>

</body>
</html>
